version: '3.9'

services:
  postgres:
    image: postgres:latest
    container_name: phone_accounting
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: phone_accounting_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "6001:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data/pgdata
      - ./init-db:/docker-entrypoint-initdb.d/
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    command: >
      postgres -c max_connections=1000
               -c shared_buffers=256MB
               -c effective_cache_size=768MB
               -c maintenance_work_mem=64MB
               -c checkpoint_completion_target=0.7
               -c wal_buffers=16MB
               -c default_statistics_target=100
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d phone_accounting_db" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    tty: true
    stdin_open: true